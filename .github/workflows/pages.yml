# Deploy GitHub Pages from an explicit allowlist of public site files.
#
# The repo is private, but a legacy branch-root Pages build published EVERY
# file on master — including tasks/** process docs — on the public domain
# (found in the 2026-06-10 security scan; see issue #29). This workflow
# stages only what the site actually serves; everything else 404s.
name: pages
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage public site files only
        run: |
          mkdir -p _site
          cp index.html v2.html CNAME latest_resume.pdf LICENSE _site/
          cp -R scene assets _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
